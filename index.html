<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Courses</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Mes Courses</h1>
      <button id="themeToggle" class="theme-btn" type="button">🌙</button>
    </header>

    <section class="card">
      <h2>Ajouter plusieurs produits</h2>
      <p class="hint">Exemple : riz, lait, bananes, poulet, yaourt</p>
      <textarea id="bulkInput" rows="4" placeholder="Écris tes produits séparés par des virgules..."></textarea>
      <button id="addProductsBtn" class="primary-btn" type="button">Ajouter à la liste</button>
    </section>

    <section class="card stats">
      <div>
        <span class="label">Produits</span>
        <strong id="totalItems">0</strong>
      </div>
      <div>
        <span class="label">Restants</span>
        <strong id="remainingItems">0</strong>
      </div>
      <div>
        <span class="label">Total validé</span>
        <strong id="validatedTotal">0,00 €</strong>
      </div>
    </section>

    <section class="card">
      <h2>Liste de courses</h2>
      <div id="shoppingList" class="shopping-list"></div>
      <div id="emptyState" class="empty-state">Aucun produit pour le moment.</div>
    </section>

    <section class="card">
      <h2>Calculatrice</h2>
      <input id="calcInput" type="text" placeholder="Exemple : 2*1.99+3.5" />
      <div class="calc-actions">
        <button id="calcBtn" class="secondary-btn" type="button">Calculer</button>
        <button id="clearCalcBtn" class="secondary-btn" type="button">Effacer</button>
      </div>
      <div id="calcResult" class="calc-result">Résultat : 0</div>
    </section>

    <section class="card">
      <h2>Actions</h2>
      <div class="action-grid">
        <button id="clearCheckedBtn" class="danger-btn" type="button">Supprimer produits validés</button>
        <button id="resetAllBtn" class="danger-btn" type="button">Réinitialiser toute la liste</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
